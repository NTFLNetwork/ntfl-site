
<html><head><style>
body{font-family:Arial;margin:0;background:#0b1220;color:white}
.header{display:flex;justify-content:space-between;align-items:center;background:#111827;padding:10px}
.wrap{padding:12px}
.card{background:#1f2937;padding:12px;margin:10px 0;border-radius:8px}
button{margin:4px;padding:6px}
input,select{padding:6px;margin:4px}
.team{display:flex;align-items:center;gap:10px;margin:6px 0}
.team img{height:30px;width:30px;object-fit:contain}
.draggable{padding:8px;background:#374151;margin:4px 0;cursor:grab}
</style></head><body>
<script>
let state = JSON.parse(localStorage.getItem("ntfl")) || {site:{name:"NTFL"},teams:[],standings:[],rankings:[]};

function save(){localStorage.setItem("ntfl",JSON.stringify(state));renderAll();}

function header(){
return '<div class="header"><b>'+state.site.name+'</b><div><a href="index.html">Home</a> | <a href="admin.html">Admin</a></div></div>'
}
</script>
<script>document.write(header())</script>
<div class="wrap">
<h2>Teams</h2>
<div id="teams"></div>

<h2>Standings</h2>
<div id="standings"></div>

<h2>Rankings</h2>
<div id="rankings"></div>
</div>

<script>
function renderAll(){
teams.innerHTML = state.teams.map(t=>`<div class="team"><img src="${t.logo}"><div>${t.name}</div></div>`).join("")
standings.innerHTML = state.standings.map(s=>`${s.team} ${s.w}-${s.l}`).join("<br>")
rankings.innerHTML = state.rankings.sort((a,b)=>a.rank-b.rank).map(r=>`#${r.rank} ${r.team}`).join("<br>")
}
renderAll()
</script>
</body></html>
